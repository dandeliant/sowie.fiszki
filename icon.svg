<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sowie Fiszki">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1f80"/>
      <stop offset="60%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,209,102,.22)"/>
      <stop offset="100%" stop-color="rgba(255,209,102,0)"/>
    </radialGradient>
  </defs>
  <!-- Tlo z zaokraglonymi rogami (purpose="any") -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>
  <!-- Emoji sowy -->
  <text x="50%" y="55%" font-size="300" text-anchor="middle" dominant-baseline="central"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Twemoji, EmojiOne, sans-serif">🦉</text>
  <!-- Marka -->
  <text x="50%" y="88%" font-size="42" font-weight="800" fill="#ffd166"
        text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        letter-spacing="2">Sowie Fiszki</text>
</svg>
