<?xml version="1.0" encoding="UTF-8"?>
<!-- OG image dla social media (1200x630 — Facebook rekomendowany rozmiar) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sowie Fiszki — nauka angielskiego">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1f80"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,209,102,.18)"/>
      <stop offset="100%" stop-color="rgba(255,209,102,0)"/>
    </radialGradient>
  </defs>
  <!-- Tło -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Sowa po lewej -->
  <text x="200" y="380" font-size="320" text-anchor="middle" dominant-baseline="central"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Twemoji, sans-serif">🦉</text>

  <!-- Tytuł po prawej -->
  <text x="400" y="220" font-size="88" font-weight="900" fill="#ffd166"
        font-family="Playfair Display, Georgia, serif">Sowie Fiszki</text>
  <text x="400" y="305" font-size="42" font-weight="700" fill="#f8f4ff"
        font-family="system-ui, sans-serif">Naucz się języka</text>
  <text x="400" y="360" font-size="42" font-weight="700" fill="#a29bfe"
        font-family="system-ui, sans-serif">przez zabawę 🎯</text>

  <!-- Bullets -->
  <g font-family="system-ui, sans-serif" font-size="28" fill="#f8f4ff" font-weight="600">
    <text x="400" y="445">🎮 30+ gier i aplikacji</text>
    <text x="400" y="490">🦉 17+ podręczników szkolnych</text>
    <text x="400" y="535">👨‍🏫 Panel nauczyciela · raporty · druk</text>
  </g>

  <!-- CTA -->
  <rect x="400" y="565" width="280" height="50" rx="25" fill="#ffd166"/>
  <text x="540" y="600" font-size="26" font-weight="800" fill="#1a1040"
        text-anchor="middle" font-family="system-ui, sans-serif">30 dni za darmo →</text>

  <!-- URL w prawym dolnym rogu -->
  <text x="1180" y="605" font-size="20" font-weight="600" fill="rgba(255,255,255,.4)"
        text-anchor="end" font-family="system-ui, sans-serif">sowiefiszki.com</text>
</svg>
