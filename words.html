<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c4dff">
<title>Słówka — Sowie Fiszki</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🦉%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="data.js"></script>
<!-- Supabase + DB warstwy — pozwala nalozyc overrides admina (admin_words) na BOOKS.
     Bez tego widac tylko bazowe slowka z data.js, bez edycji admina. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="db.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px 14px;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1e1f3f 0%, #2a1a4f 100%);
    color: #e8e8ff;
    min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #ffd166;
    margin: 0;
  }
  .sub {
    font-size: .78rem;
    color: rgba(232, 232, 255, .65);
    font-weight: 600;
    margin-top: 2px;
  }
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    background: rgba(255, 255, 255, .08);
    border: 1.5px solid rgba(255, 255, 255, .15);
    border-radius: 100px;
    color: #fff;
    font-weight: 700;
    font-size: .82rem;
    text-decoration: none;
    transition: all .2s;
  }
  .back:hover { background: rgba(255, 209, 102, .18); border-color: #ffd166; color: #ffd166; }

  .filters {
    display: grid;
    grid-template-columns: 1.1fr 1fr 1.4fr auto;
    gap: 8px;
    background: rgba(255, 255, 255, .05);
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) {
    .filters { grid-template-columns: 1fr 1fr; }
    .filters > .search-wrap { grid-column: 1 / -1; }
  }
  .filters select, .filters input {
    width: 100%;
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, .15);
    background: rgba(0, 0, 0, .25);
    color: #fff;
    font-family: inherit;
    font-size: .84rem;
    font-weight: 600;
    outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: #7c4dff; }
  .filters .stats {
    align-self: center;
    font-size: .72rem;
    color: rgba(232, 232, 255, .7);
    font-weight: 700;
    text-align: right;
    padding: 0 4px;
  }

  .table-wrap {
    background: rgba(255, 255, 255, .04);
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 12px;
    overflow: hidden;
  }
  .row-head, .row {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1.6fr 1.6fr auto;
    gap: 10px;
    padding: 9px 14px;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, .06);
  }
  .row .edit-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px 10px;
    background: rgba(255, 209, 102, .15);
    border: 1px solid rgba(255, 209, 102, .35);
    border-radius: 8px;
    color: #ffd166;
    text-decoration: none;
    font-weight: 800;
    font-size: .72rem;
    transition: all .15s;
  }
  .row .edit-btn:hover {
    background: rgba(255, 209, 102, .28);
    border-color: #ffd166;
    transform: translateY(-1px);
  }
  .row-head {
    border-top: none;
    background: rgba(0, 0, 0, .25);
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: rgba(232, 232, 255, .65);
    font-weight: 800;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .row { font-size: .78rem; font-weight: 600; }
  .row:nth-child(even) { background: rgba(255, 255, 255, .015); }
  .row .book { color: rgba(232, 232, 255, .55); font-size: .68rem; }
  .row .unit { color: #a29bfe; font-size: .72rem; }
  .row .pl { color: #fff; }
  .row .en { color: #ffd166; }
  .row .sent { color: rgba(232, 232, 255, .55); font-size: .72rem; line-height: 1.35; }
  @media (max-width: 720px) {
    .row-head { display: none; }
    .row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 12px 14px;
    }
    .row .edit-btn { width: max-content; margin-top: 6px; }
    .row > div::before {
      content: attr(data-lbl);
      display: inline-block;
      min-width: 72px;
      font-size: .58rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: rgba(232, 232, 255, .5);
      font-weight: 800;
      margin-right: 6px;
    }
  }
  .empty {
    padding: 28px;
    text-align: center;
    color: rgba(232, 232, 255, .55);
    font-weight: 600;
    font-size: .85rem;
  }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: .68rem;
    color: rgba(232, 232, 255, .35);
    font-weight: 600;
  }
  @media print {
    .back, .filters, .footer { display: none !important; }
    body { background: #fff; color: #000; }
    .row { color: #000 !important; }
    .row .pl, .row .en { color: #000 !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1 class="title">🔤 Słówka</h1>
      <div class="sub">Podgląd słówek ze wszystkich podręczników</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="back" id="refreshBtn" title="Pobierz najnowsze edycje admina z Supabase" style="border:1.5px solid rgba(255,255,255,.15);background:rgba(6,214,160,.12);color:#06D6A0;cursor:pointer;font-family:inherit">🔄 Odśwież</button>
      <a href="app.html" class="back">← Sowie Fiszki</a>
    </div>
  </div>

  <div class="filters">
    <select id="bookFilter">
      <option value="">📚 Wszystkie podręczniki</option>
    </select>
    <select id="unitFilter">
      <option value="">📑 Wszystkie unity</option>
    </select>
    <div class="search-wrap" style="display:flex">
      <input id="searchInp" type="text" placeholder="🔍 Szukaj po polsku, angielsku lub w zdaniu…" autocomplete="off">
    </div>
    <div class="stats" id="stats">—</div>
  </div>

  <div class="table-wrap">
    <div class="row-head">
      <div>Podręcznik / Unit</div>
      <div>Polski</div>
      <div>Angielski</div>
      <div>Zdanie PL</div>
      <div>Zdanie EN</div>
      <div>Edycja</div>
    </div>
    <div style="font-size:.7rem;color:rgba(232,232,255,.55);font-weight:600;padding:8px 14px;border-top:1px solid rgba(255,255,255,.06);background:rgba(255,209,102,.06)">
      💡 Kliknij <strong>✏️ Edytuj</strong>, aby otworzyć dany unit w trybie edycji w aplikacji (wymaga konta admina). Można otworzyć w nowej karcie prawym klikiem.
    </div>
    <div id="rows"></div>
  </div>

  <div class="footer">© 2026 Sowie Fiszki</div>
</div>

<script>
'use strict';
(async function () {
  if (typeof BOOKS === 'undefined') {
    document.getElementById('rows').innerHTML = '<div class="empty">⚠️ Nie udało się załadować data.js.</div>';
    return;
  }

  // Naloz overrides admina (admin_words / admin_books / admin_units) na BOOKS.
  // Bez tego widac tylko bazowe slowka z data.js. Po DB.loadAdminData()
  // BOOKS jest zmutowany i odzwierciedla aktualny stan w Supabase
  // (wpisy admina, nowe podreczniki, edycje slowek, soft-delete).
  // loadAdminData nie wymaga DB.init — to tylko 3 SELECT-y (RLS public).
  // Best-effort: jesli sie nie powiedzie, pokazujemy bazowy data.js.
  const statsEl0 = document.getElementById('stats');
  if (statsEl0) statsEl0.textContent = '⏳ Ładuję overrides admina…';
  try {
    if (typeof DB !== 'undefined' && typeof DB.loadAdminData === 'function') {
      await DB.loadAdminData();
    }
  } catch(e) {
    console.warn('[words.html] loadAdminData:', e.message || e);
  }

  const bookSel = document.getElementById('bookFilter');
  const unitSel = document.getElementById('unitFilter');
  const searchInp = document.getElementById('searchInp');
  const rowsEl = document.getElementById('rows');
  const statsEl = document.getElementById('stats');

  // Wypelnij select podrecznikow (rebuild — moga sie pojawic nowe podreczniki admina)
  function rebuildBookSelect() {
    const cur = bookSel.value;
    bookSel.innerHTML = '<option value="">📚 Wszystkie podręczniki</option>';
    Object.values(BOOKS).forEach(b => {
      const o = document.createElement('option');
      o.value = b.id;
      o.textContent = (b.icon || '📖') + ' ' + b.name + (b.adminOnly ? ' (admin)' : '');
      bookSel.appendChild(o);
    });
    if (cur && BOOKS[cur]) bookSel.value = cur;
  }
  rebuildBookSelect();

  // Zbuduj plaska liste wszystkich slowek
  function buildAll() {
    const all = [];
    Object.values(BOOKS).forEach(b => {
      Object.entries(b.units || {}).forEach(([uKey, u]) => {
        (u.words || []).forEach(w => {
          all.push({
            bookId: b.id,
            bookName: b.shortName || b.name,
            bookIcon: b.icon || '📖',
            unitKey: uKey,
            unitName: u.name || uKey,
            unitIcon: u.icon || '📖',
            pl: w[0] || '',
            en: w[1] || '',
            sentPl: w[2] || '',
            sentEn: w[3] || '',
          });
        });
      });
    });
    return all;
  }

  let ALL = buildAll();

  // Funkcja przeladowania danych z Supabase + odswiezenia widoku
  async function reloadFromServer() {
    if (typeof DB === 'undefined' || typeof DB.loadAdminData !== 'function') return;
    const btn = document.getElementById('refreshBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Ładuję…'; }
    try {
      await DB.loadAdminData();
      ALL = buildAll();
      rebuildBookSelect();
      // Jesli wybrany unit nie istnieje juz po odswiezeniu — wyczysc
      const cur = unitSel.value;
      const bId = bookSel.value;
      if (cur && bId && !(BOOKS[bId]?.units?.[cur])) unitSel.value = '';
      render();
    } catch(e) {
      console.warn('[reload]', e.message || e);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '🔄 Odśwież'; }
    }
  }
  // Auto-odswiezenie gdy uzytkownik wraca na karte (np. po edycji w sasiedniej karcie)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') reloadFromServer();
  });
  // Przycisk Odswiez
  document.getElementById('refreshBtn')?.addEventListener('click', reloadFromServer);

  function refreshUnitOptions() {
    const bookId = bookSel.value;
    unitSel.innerHTML = '<option value="">📑 Wszystkie unity</option>';
    if (!bookId || !BOOKS[bookId]) return;
    Object.entries(BOOKS[bookId].units || {}).forEach(([uKey, u]) => {
      const o = document.createElement('option');
      o.value = uKey;
      o.textContent = (u.icon || '📖') + ' ' + (u.name || uKey);
      unitSel.appendChild(o);
    });
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render() {
    const bookId = bookSel.value;
    const unitKey = unitSel.value;
    const q = (searchInp.value || '').trim().toLowerCase();

    const filtered = ALL.filter(r => {
      if (bookId && r.bookId !== bookId) return false;
      if (unitKey && r.unitKey !== unitKey) return false;
      if (q) {
        const hay = (r.pl + ' ' + r.en + ' ' + r.sentPl + ' ' + r.sentEn).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    statsEl.textContent = filtered.length.toLocaleString('pl-PL') + ' / ' + ALL.length.toLocaleString('pl-PL') + ' słówek';

    if (!filtered.length) {
      rowsEl.innerHTML = '<div class="empty">Brak wyników. Zmień filtr lub wyszukaj inną frazę.</div>';
      return;
    }

    // Limit dla wydajnosci — pokaz max 1000 wierszy
    const slice = filtered.slice(0, 1000);
    let html = '';
    slice.forEach(r => {
      const editHref = 'app.html#/book/' + encodeURIComponent(r.bookId) + '/' + encodeURIComponent(r.unitKey);
      html += '<div class="row">'
        + '<div data-lbl="Podr.">' + '<div class="book">' + esc(r.bookIcon) + ' ' + esc(r.bookName) + '</div>'
        +   '<div class="unit">' + esc(r.unitIcon) + ' ' + esc(r.unitName) + '</div></div>'
        + '<div class="pl" data-lbl="PL">' + esc(r.pl) + '</div>'
        + '<div class="en" data-lbl="EN">' + esc(r.en) + '</div>'
        + '<div class="sent" data-lbl="Zd. PL">' + esc(r.sentPl || '—') + '</div>'
        + '<div class="sent" data-lbl="Zd. EN">' + esc(r.sentEn || '—') + '</div>'
        + '<div data-lbl="Edycja">'
        +   '<a class="edit-btn" href="' + editHref + '" title="Otwórz unit w aplikacji (admin: ✏️/🗑️/😀 przy każdym słowie)">✏️ Edytuj</a>'
        + '</div>'
        + '</div>';
    });
    if (filtered.length > slice.length) {
      html += '<div class="empty">Pokazano pierwsze ' + slice.length.toLocaleString('pl-PL')
        + ' z ' + filtered.length.toLocaleString('pl-PL') + '. Doprecyzuj filtr, żeby zobaczyć resztę.</div>';
    }
    rowsEl.innerHTML = html;
  }

  bookSel.addEventListener('change', () => { refreshUnitOptions(); render(); });
  unitSel.addEventListener('change', render);
  let searchTimer = null;
  searchInp.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 200);
  });
  render();
})();
</script>
</body>
</html>
