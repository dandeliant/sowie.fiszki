<?xml version="1.0" encoding="UTF-8"?>
<!-- Maskable icon: zawartosc w strefie bezpiecznej (inner 80%) bo Android tnie ikony do roznych ksztaltow -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sowie Fiszki">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1f80"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
  </defs>
  <!-- Pelne wypelnienie (Android maskuje do okragu/squircle/kwadratu) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Emoji sowy mniejsze i w strefie bezpiecznej (inner 60%) -->
  <text x="50%" y="56%" font-size="230" text-anchor="middle" dominant-baseline="central"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Twemoji, EmojiOne, sans-serif">🦉</text>
</svg>
