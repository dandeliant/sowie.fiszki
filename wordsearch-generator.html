<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Wordsearch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --paper: #fdf8f0;
    --paper-dark: #f5ede0;
    --ink: #1a1208;
    --ink-light: #4a3c28;
    --accent: #c0392b;
    --accent2: #2c6e49;
    --grid-bg: #fff;
    --border: #c8b89a;
    --shadow: rgba(60,40,10,0.13);
    --cell-size: 36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d0;
    font-family: 'Source Serif 4', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 60px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,0.12) 28px, rgba(180,160,120,0.12) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(180,160,120,0.08) 28px, rgba(180,160,120,0.08) 29px);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 30px;
  }

  /* EDITOR PANEL */
  .editor-panel {
    background: var(--paper);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    width: 100%;
    max-width: 820px;
    box-shadow: 6px 6px 0 var(--shadow);
    margin-bottom: 24px;
  }

  .editor-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-panel h2::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .editor-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  textarea {
    flex: 1;
    min-width: 200px;
    min-height: 100px;
    border: 1.5px solid var(--border);
    background: var(--grid-bg);
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    color: var(--ink);
    padding: 12px 14px;
    resize: vertical;
    border-radius: 2px;
    line-height: 1.7;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }

  .editor-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 180px;
  }

  label.opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
    display: block;
  }

  select, input[type=text], input[type=number] {
    border: 1.5px solid var(--border);
    background: var(--grid-bg);
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    padding: 7px 10px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-light);
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 11px 20px;
    border-radius: 2px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translate(2px, 2px); box-shadow: none !important; }
  .btn:disabled { opacity: 0.5; cursor: wait; }

  .btn-generate {
    background: var(--accent);
    color: #fff;
    box-shadow: 3px 3px 0 #7d1f16;
    width: 100%;
  }
  .btn-generate:hover:not(:disabled) { background: #a93226; }

  .btn-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .btn-print {
    background: var(--ink);
    color: #fff;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.35);
  }
  .btn-print:hover { background: #2d2215; }

  .btn-pdf {
    background: var(--accent2);
    color: #fff;
    box-shadow: 3px 3px 0 #1a4030;
  }
  .btn-pdf:hover:not(:disabled) { background: #245a3c; }

  .btn-jpeg {
    background: #7b5ea7;
    color: #fff;
    box-shadow: 3px 3px 0 #4a3066;
  }
  .btn-jpeg:hover:not(:disabled) { background: #6a4f93; }

  /* WORKSHEET */
  #worksheet {
    background: var(--paper);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 36px 40px 40px;
    width: 100%;
    max-width: 820px;
    box-shadow: 6px 6px 0 var(--shadow);
    display: none;
  }

  .ws-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    border-bottom: 2.5px solid var(--ink);
    padding-bottom: 14px;
  }

  .ws-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
  }

  .ws-meta {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-light);
    line-height: 2;
    letter-spacing: 0.05em;
  }

  .ws-meta span {
    display: block;
    border-bottom: 1px solid var(--border);
    min-width: 130px;
  }

  .ws-instruction {
    font-family: 'Source Serif 4', serif;
    font-size: 0.83rem;
    color: var(--ink-light);
    font-style: italic;
    margin: 10px 0 20px;
  }

  /* GRID */
  .grid-wrapper {
    overflow-x: auto;
    margin-bottom: 28px;
  }

  #grid-table {
    border-collapse: collapse;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin: 0 auto;
  }

  #grid-table td {
    width: var(--cell-size);
    height: var(--cell-size);
    text-align: center;
    vertical-align: middle;
    border: 1px solid var(--paper-dark);
    background: var(--grid-bg);
    user-select: none;
    cursor: default;
    transition: background 0.15s;
    letter-spacing: 0;
  }

  /* WORD LIST */
  .ws-wordlist-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    border-top: 2px solid var(--ink);
    padding-top: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ws-wordlist-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 18px;
    list-style: none;
  }

  .word-list li {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    background: var(--paper-dark);
  }

  .word-list li.found {
    text-decoration: line-through;
    color: var(--ink-light);
    opacity: 0.5;
  }

  .solution-toggle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 10px;
    display: inline-block;
  }

  td.highlighted { background: #ffe0b2 !important; }
  td.solution-hl { background: #b8e0c8 !important; color: var(--accent2) !important; }

  .msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    margin-top: 10px;
    min-height: 18px;
  }

  /* ═══ PRINT FIX ═══ */
  @media print {
    html, body {
      background: white !important;
      background-image: none !important;
      display: block !important;
      padding: 0 !important;
      margin: 0 !important;
      width: 100% !important;
      min-height: auto !important;
    }

    .editor-panel,
    .btn-group,
    h1,
    .subtitle,
    .solution-toggle { display: none !important; }

    #worksheet {
      display: block !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      padding: 15px !important;
      margin: 0 !important;
      background: white !important;
    }

    #grid-table td {
      border-color: #ccc !important;
      background: white !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    td.solution-hl {
      background: #d4edda !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .word-list li {
      background: #f0f0f0 !important;
      border-color: #ccc !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .ws-header { border-bottom-color: #000 !important; }
    .ws-wordlist-title { border-top-color: #000 !important; }

    @page {
      size: A4;
      margin: 12mm;
    }
  }
</style>
</head>
<body>

<h1>Wordsearch</h1>
<p class="subtitle">Generator kart pracy</p>

<!-- EDITOR -->
<div class="editor-panel">
  <h2>Wpisz lub wklej slowka</h2>
  <div class="editor-row">
    <textarea id="words-input" placeholder="Jedno slowo na linie lub oddzielone przecinkami / spacja:&#10;&#10;apple&#10;banana&#10;orange&#10;grape&#10;lemon"></textarea>
    <div class="editor-options">
      <div>
        <label class="opt-label">Tytul cwiczenia</label>
        <input type="text" id="ws-title-input" value="Wordsearch" placeholder="np. Animals, Food...">
      </div>
      <div>
        <label class="opt-label">Instrukcja (opcja)</label>
        <input type="text" id="ws-instr-input" value="Znajdz wszystkie ukryte slowka w siatce liter." placeholder="Tresc polecenia...">
      </div>
      <div>
        <label class="opt-label">Rozmiar siatki (kolumny)</label>
        <input type="number" id="grid-size" value="15" min="8" max="30">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="opt-diagonal" checked>
        <label for="opt-diagonal">Diagonalnie</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="opt-backwards" checked>
        <label for="opt-backwards">Wstecz</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="opt-solution">
        <label for="opt-solution">Pokaz rozwiazanie</label>
      </div>
      <button class="btn btn-generate" onclick="generate()">&#9654; Generuj puzzle</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>
</div>

<!-- ACTION BUTTONS -->
<div class="btn-group" id="action-btns" style="display:none;">
  <button class="btn btn-print" onclick="doPrint()">&#128424; Drukuj</button>
  <button class="btn btn-pdf" id="btn-pdf" onclick="downloadPDF()">&#11015; Pobierz PDF</button>
  <button class="btn btn-jpeg" id="btn-jpeg" onclick="downloadJPEG()">&#128444; Pobierz JPEG</button>
</div>

<!-- WORKSHEET (printable) -->
<div id="worksheet">
  <div class="ws-header">
    <div class="ws-title" id="ws-title-display">Wordsearch</div>
    <div class="ws-meta">
      <span>Imie i nazwisko: ____________________</span>
      <span>Klasa: ______________ Data: __________</span>
      <span>Wynik: _______ / _______ slow</span>
    </div>
  </div>
  <p class="ws-instruction" id="ws-instr-display"></p>

  <div class="grid-wrapper">
    <table id="grid-table"></table>
  </div>

  <div class="ws-wordlist-title">Slowka do znalezienia</div>
  <ul class="word-list" id="word-list"></ul>
</div>

<script>
// == GLOBALS ==
let GRID = [];
let ROWS = 0, COLS = 0;
let PLACEMENTS = [];

// == PARSE INPUT ==
function parseWords(raw) {
  return [...new Set(
    raw.split(/[\n,;]+/)
       .map(w => w.trim().toUpperCase().replace(/[^A-Z\u0104\u0106\u0118\u0141\u0143\u00D3\u015A\u0179\u017B]/g, ''))
       .filter(w => w.length >= 2)
  )];
}

// == GRID UTILS ==
function emptyGrid(rows, cols) {
  return Array.from({length: rows}, () => Array(cols).fill(''));
}

function canPlace(grid, word, r, c, dr, dc) {
  const rows = grid.length, cols = grid[0].length;
  for (let i = 0; i < word.length; i++) {
    const nr = r + i * dr, nc = c + i * dc;
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return false;
    if (grid[nr][nc] !== '' && grid[nr][nc] !== word[i]) return false;
  }
  return true;
}

function placeWord(grid, word, r, c, dr, dc) {
  const cells = [];
  for (let i = 0; i < word.length; i++) {
    const nr = r + i * dr, nc = c + i * dc;
    grid[nr][nc] = word[i];
    cells.push({r: nr, c: nc});
  }
  return cells;
}

function fillRandom(grid) {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < grid[0].length; c++)
      if (grid[r][c] === '') grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
}

// == GENERATE ==
function generate() {
  const raw   = document.getElementById('words-input').value;
  const words = parseWords(raw);
  const msg   = document.getElementById('msg');

  if (words.length === 0) { msg.textContent = '\u26A0 Wpisz co najmniej jedno slowo!'; return; }

  const diagonal  = document.getElementById('opt-diagonal').checked;
  const backwards = document.getElementById('opt-backwards').checked;

  let dirSet = [{dr:0,dc:1},{dr:1,dc:0}];
  if (backwards) dirSet.push({dr:0,dc:-1},{dr:-1,dc:0});
  if (diagonal)  dirSet.push({dr:1,dc:1},{dr:1,dc:-1});
  if (diagonal && backwards) dirSet.push({dr:-1,dc:1},{dr:-1,dc:-1});

  const maxLen = Math.max(...words.map(w => w.length));
  let size = parseInt(document.getElementById('grid-size').value) || 15;
  size = Math.max(size, maxLen + 2);

  ROWS = size; COLS = size;
  PLACEMENTS = [];

  let placed = [];
  let grid;
  for (let attempt = 0; attempt < 15; attempt++) {
    grid = emptyGrid(ROWS, COLS);
    placed = [];
    const shuffled = [...words].sort(() => Math.random() - 0.5);

    let allPlaced = true;
    for (const word of shuffled) {
      let success = false;
      for (let tries = 0; tries < 300; tries++) {
        const {dr, dc} = dirSet[Math.floor(Math.random() * dirSet.length)];
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (canPlace(grid, word, r, c, dr, dc)) {
          const cells = placeWord(grid, word, r, c, dr, dc);
          placed.push({word, cells});
          success = true;
          break;
        }
      }
      if (!success) {
        allPlaced = false;
        size = Math.min(size + 2, 30);
        ROWS = size; COLS = size;
        break;
      }
    }
    if (allPlaced) break;
  }

  fillRandom(grid);
  GRID = grid;
  PLACEMENTS = placed;

  const missing = words.filter(w => !placed.find(p => p.word === w));
  if (missing.length > 0) {
    msg.textContent = '\u26A0 Nie udalo sie umiescic: ' + missing.join(', ') + '. Sprobuj zwiekszyc rozmiar siatki.';
  } else {
    msg.textContent = '\u2713 Wygenerowano puzzle z ' + words.length + ' slowami.';
  }

  renderGrid(grid);
  renderWordList(placed.map(p => p.word));

  document.getElementById('ws-title-display').textContent = document.getElementById('ws-title-input').value || 'Wordsearch';
  document.getElementById('ws-instr-display').textContent = document.getElementById('ws-instr-input').value;

  const ws = document.getElementById('worksheet');
  ws.style.display = 'block';
  document.getElementById('action-btns').style.display = 'flex';

  adjustCellSize();

  if (document.getElementById('opt-solution').checked) showSolution();
  else clearSolution();
}

// == RENDER GRID ==
function renderGrid(grid) {
  const table = document.getElementById('grid-table');
  table.innerHTML = '';
  for (let r = 0; r < grid.length; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < grid[0].length; c++) {
      const td = document.createElement('td');
      td.textContent = grid[r][c];
      td.dataset.r = r; td.dataset.c = c;
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
}

// == RENDER WORD LIST ==
function renderWordList(words) {
  const ul = document.getElementById('word-list');
  ul.innerHTML = '';
  words.slice().sort().forEach(w => {
    const li = document.createElement('li');
    li.textContent = w;
    li.id = 'wl-' + w;
    ul.appendChild(li);
  });
}

// == SOLUTION ==
function showSolution() {
  PLACEMENTS.forEach(({cells}) => {
    cells.forEach(({r, c}) => {
      const td = document.querySelector('#grid-table td[data-r="' + r + '"][data-c="' + c + '"]');
      if (td) td.classList.add('solution-hl');
    });
  });
}

function clearSolution() {
  document.querySelectorAll('#grid-table td.solution-hl').forEach(td => td.classList.remove('solution-hl'));
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('opt-solution').addEventListener('change', e => {
    if (e.target.checked) showSolution(); else clearSolution();
  });
});

// == CELL SIZE ==
function adjustCellSize() {
  if (COLS <= 0) return;
  const maxW = Math.min(740, window.innerWidth - 100);
  const size = Math.max(20, Math.floor(maxW / COLS));
  document.documentElement.style.setProperty('--cell-size', size + 'px');
  document.getElementById('grid-table').style.fontSize = Math.max(9, size * 0.52) + 'px';
}
window.addEventListener('resize', adjustCellSize);

// == PRINT ==
function doPrint() {
  const ws = document.getElementById('worksheet');
  if (!ws || ws.style.display === 'none') {
    alert('Najpierw wygeneruj puzzle!');
    return;
  }
  adjustCellSize();
  window.print();
}

// == DOWNLOAD PDF ==
async function downloadPDF() {
  const ws = document.getElementById('worksheet');
  if (!ws || ws.style.display === 'none') return;

  const btn = document.getElementById('btn-pdf');
  btn.disabled = true;
  btn.textContent = '\u23F3 Generuje PDF...';

  try {
    adjustCellSize();
    // Temporarily force visible styles for capture
    ws.style.background = '#fdf8f0';
    const canvas = await html2canvas(ws, {
      scale: 2,
      backgroundColor: '#fdf8f0',
      useCORS: true,
      logging: false,
      windowWidth: ws.scrollWidth + 80,
      windowHeight: ws.scrollHeight + 80
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const {jsPDF} = window.jspdf;

    // Fit to A4
    const a4w = 210, a4h = 297; // mm
    const margin = 10;
    const usableW = a4w - 2 * margin;
    const usableH = a4h - 2 * margin;
    const ratio = canvas.width / canvas.height;
    let imgW, imgH;
    if (ratio > usableW / usableH) {
      imgW = usableW;
      imgH = usableW / ratio;
    } else {
      imgH = usableH;
      imgW = usableH * ratio;
    }

    const pdf = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
    const x = (a4w - imgW) / 2;
    const y = margin;
    pdf.addImage(imgData, 'JPEG', x, y, imgW, imgH);
    const title = document.getElementById('ws-title-input').value.replace(/\s+/g, '_') || 'wordsearch';
    pdf.save(title + '.pdf');
  } catch(e) {
    alert('Blad przy generowaniu PDF: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '\u2B07 Pobierz PDF';
  }
}

// == DOWNLOAD JPEG ==
async function downloadJPEG() {
  const ws = document.getElementById('worksheet');
  if (!ws || ws.style.display === 'none') return;

  const btn = document.getElementById('btn-jpeg');
  btn.disabled = true;
  btn.textContent = '\u23F3 Generuje JPEG...';

  try {
    adjustCellSize();
    ws.style.background = '#fdf8f0';
    const canvas = await html2canvas(ws, {
      scale: 2,
      backgroundColor: '#fdf8f0',
      useCORS: true,
      logging: false,
      windowWidth: ws.scrollWidth + 80,
      windowHeight: ws.scrollHeight + 80
    });
    const link = document.createElement('a');
    link.download = (document.getElementById('ws-title-input').value.replace(/\s+/g, '_') || 'wordsearch') + '.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  } catch(e) {
    alert('Blad przy generowaniu JPEG: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '\uD83D\uDDBC Pobierz JPEG';
  }
}
</script>
</body>
</html>
