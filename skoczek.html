<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏝️ Skoczek — wybierz słówka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root{
  --sky-1:#67e8f9; --sky-2:#06b6d4; --sand:#fbbf24; --palm:#10b981;
  --water:#0891b2; --ink:#0c1e35;
  --text:#fff; --muted:rgba(255,255,255,.75);
  --panel:rgba(12,30,53,.78);
  --border:rgba(255,255,255,.25);
  --accent:#fcd34d; --ok:#10b981; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#67e8f9 0%,#06b6d4 60%,#0891b2 100%);
  min-height:100vh;overflow-x:hidden;position:relative;
}
body::before{
  content:"🏝️ 🌴 ☀️ 🐚 🌊";
  position:fixed;inset:0;font-size:48px;opacity:.07;
  word-spacing:120px;line-height:160px;letter-spacing:24px;
  pointer-events:none;transform:rotate(-4deg);overflow:hidden;
}
.back-link{
  position:fixed;top:14px;left:14px;z-index:10;
  display:inline-flex;align-items:center;gap:6px;padding:9px 16px;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);
  border-radius:100px;color:#fff;font-weight:700;font-size:.85rem;
  text-decoration:none;backdrop-filter:blur(10px);transition:all .2s;
}
.back-link:hover{background:rgba(255,255,255,.28);}
.wrap{max-width:520px;margin:0 auto;padding:74px 18px 40px;position:relative;z-index:1;}
.title-card{
  background:var(--panel);backdrop-filter:blur(14px);
  border:2px solid var(--border);border-radius:28px;
  padding:36px 30px;box-shadow:0 30px 60px rgba(8,30,53,.4);
}
.icon{font-size:4rem;text-align:center;margin-bottom:6px;line-height:1;}
.title{
  font-family:'Fredoka',sans-serif;font-size:clamp(1.7rem,4vw,2.3rem);font-weight:700;
  text-align:center;margin-bottom:6px;color:var(--accent);
  text-shadow:0 4px 12px rgba(0,0,0,.3);
}
.subtitle{text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:22px;line-height:1.5;}
label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:800;margin:14px 0 5px;}
select{
  width:100%;padding:12px 14px;font-size:.95rem;font-family:inherit;font-weight:600;
  background:rgba(0,0,0,.3);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);outline:none;
}
select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(252,211,77,.3);}
.btn-start{
  width:100%;margin-top:24px;padding:16px;font-size:1.15rem;font-weight:900;
  font-family:'Fredoka',sans-serif;letter-spacing:.06em;cursor:pointer;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);border:none;border-radius:100px;
  color:var(--ink);box-shadow:0 10px 30px rgba(245,158,11,.5);transition:all .2s;
}
.btn-start:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 40px rgba(245,158,11,.7);}
.btn-start:disabled{opacity:.5;cursor:not-allowed;}
.info{
  margin-top:18px;padding:12px 14px;background:rgba(0,0,0,.25);
  border:1px dashed rgba(255,255,255,.25);border-radius:12px;
  font-size:.78rem;color:var(--muted);line-height:1.5;
}
.info strong{color:var(--accent);}
.footer{text-align:center;font-size:.7rem;color:rgba(255,255,255,.6);font-weight:600;margin-top:24px;padding:10px;}
@media print{.back-link{display:none!important;}body{background:#fff;color:#000;}}
</style>
</head>
<body>
<a href="app.html" class="back-link">← Powrót do Sowie Fiszki</a>
<div class="wrap">
  <div class="title-card">
    <div class="icon">🏝️</div>
    <h1 class="title">Skoczek</h1>
    <div class="subtitle">Skacz na właściwy kwadrat z poprawnym tłumaczeniem!<br>3 życia · 5 sekund na rundę.</div>

    <label for="bookSel">📚 Podręcznik</label>
    <select id="bookSel" onchange="onBookChange()">
      <option value="">— Wybierz —</option>
    </select>

    <label for="unitSel">📑 Unit</label>
    <select id="unitSel" disabled>
      <option value="">— Najpierw wybierz podręcznik —</option>
    </select>

    <button class="btn-start" id="startBtn" onclick="startGame()" disabled>🏝️ START</button>

    <div class="info">
      💡 Pojawia się <strong>polskie słowo</strong> (i jest czytane na głos), a Ty wybierasz właściwy angielski kwadrat. <strong>3 błędy = koniec gry.</strong>
    </div>
  </div>
  <div class="footer">© 2026 Sowie Fiszki</div>
</div>
<script>
'use strict';
(function(){
  if (typeof BOOKS === 'undefined') return;
  const bs = document.getElementById('bookSel');
  Object.values(BOOKS)
    .filter(b => !b.adminOnly)
    .sort((a,b) => (a.name||'').localeCompare(b.name||'', 'pl'))
    .forEach(b => {
      const o = document.createElement('option');
      o.value = b.id;
      o.textContent = (b.icon||'📖') + ' ' + b.name;
      bs.appendChild(o);
    });
})();
function onBookChange(){
  const bId = document.getElementById('bookSel').value;
  const us = document.getElementById('unitSel');
  const lb = document.getElementById('startBtn');
  us.innerHTML = '';
  if (!bId || !BOOKS[bId]) {
    us.innerHTML = '<option value="">— Najpierw wybierz podręcznik —</option>';
    us.disabled = true; lb.disabled = true; return;
  }
  const all = document.createElement('option');
  all.value = 'all'; all.textContent = '🌍 Wszystkie słowa z podręcznika';
  us.appendChild(all);
  Object.entries(BOOKS[bId].units || {}).forEach(([key, u]) => {
    const o = document.createElement('option');
    o.value = key; o.textContent = (u.icon||'📖') + ' ' + (u.name||key);
    us.appendChild(o);
  });
  us.disabled = false; us.value = 'all'; lb.disabled = false;
}
function startGame(){
  const bId = document.getElementById('bookSel').value;
  const uKey = document.getElementById('unitSel').value;
  if (!bId || !uKey) { alert('Wybierz podręcznik i unit.'); return; }
  window.location.href = 'app.html?game=jump&book=' + encodeURIComponent(bId) + '&unit=' + encodeURIComponent(uKey);
}
</script>
</body>
</html>
