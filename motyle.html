<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦋 Motyle — wybierz słówka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root{
  --meadow-1:#86efac; --meadow-2:#22c55e; --sky:#93c5fd;
  --pink:#f472b6; --violet:#a78bfa; --gold:#fde047;
  --text:#fff; --muted:rgba(255,255,255,.78);
  --panel:rgba(76,29,149,.78);
  --border:rgba(255,255,255,.3);
  --accent:#fde047;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#a78bfa 0%,#f472b6 50%,#fde047 100%);
  background-attachment:fixed;
  min-height:100vh;overflow-x:hidden;position:relative;
}
body::before{
  content:"🦋 🌸 🌼 🦋 🌺 🌷 🦋";
  position:fixed;inset:0;font-size:42px;opacity:.18;
  word-spacing:90px;line-height:140px;letter-spacing:18px;
  pointer-events:none;transform:rotate(-6deg);overflow:hidden;
}
.back-link{
  position:fixed;top:14px;left:14px;z-index:10;
  display:inline-flex;align-items:center;gap:6px;padding:9px 16px;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);
  border-radius:100px;color:#fff;font-weight:700;font-size:.85rem;
  text-decoration:none;backdrop-filter:blur(10px);transition:all .2s;
}
.back-link:hover{background:rgba(255,255,255,.32);}
.wrap{max-width:520px;margin:0 auto;padding:74px 18px 40px;position:relative;z-index:1;}
.title-card{
  background:var(--panel);backdrop-filter:blur(14px);
  border:2px solid var(--border);border-radius:28px;
  padding:36px 30px;box-shadow:0 30px 60px rgba(76,29,149,.5);
}
.icon{font-size:4rem;text-align:center;margin-bottom:6px;line-height:1;animation:flutter 2s ease-in-out infinite;}
@keyframes flutter{0%,100%{transform:rotate(-6deg) scale(1);}50%{transform:rotate(6deg) scale(1.05);}}
.title{
  font-family:'Fredoka',sans-serif;font-size:clamp(1.7rem,4vw,2.3rem);font-weight:700;
  text-align:center;margin-bottom:6px;color:var(--accent);
  text-shadow:0 4px 12px rgba(76,29,149,.5);
}
.subtitle{text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:22px;line-height:1.5;}
label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:800;margin:14px 0 5px;}
select{
  width:100%;padding:12px 14px;font-size:.95rem;font-family:inherit;font-weight:600;
  background:rgba(0,0,0,.3);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);outline:none;
}
select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(253,224,71,.4);}
.btn-start{
  width:100%;margin-top:24px;padding:16px;font-size:1.15rem;font-weight:900;
  font-family:'Fredoka',sans-serif;letter-spacing:.06em;cursor:pointer;
  background:linear-gradient(135deg,#f472b6,#a78bfa);border:none;border-radius:100px;
  color:#fff;box-shadow:0 10px 30px rgba(168,85,247,.55);transition:all .2s;
}
.btn-start:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 40px rgba(168,85,247,.75);}
.btn-start:disabled{opacity:.5;cursor:not-allowed;}
.info{
  margin-top:18px;padding:12px 14px;background:rgba(0,0,0,.25);
  border:1px dashed rgba(255,255,255,.3);border-radius:12px;
  font-size:.78rem;color:var(--muted);line-height:1.5;
}
.info strong{color:var(--accent);}
.footer{text-align:center;font-size:.7rem;color:rgba(255,255,255,.7);font-weight:600;margin-top:24px;padding:10px;}
@media print{.back-link{display:none!important;}body{background:#fff;color:#000;}}
</style>
</head>
<body>
<a href="app.html" class="back-link">← Powrót do Sowie Fiszki</a>
<div class="wrap">
  <div class="title-card">
    <div class="icon">🦋</div>
    <h1 class="title">Motyle</h1>
    <div class="subtitle">Łap motyle z prawidłowym tłumaczeniem!<br><strong>30 sekund</strong> · zła łapa = -1 punkt.</div>

    <label for="bookSel">📚 Podręcznik</label>
    <select id="bookSel" onchange="onBookChange()">
      <option value="">— Wybierz —</option>
    </select>

    <label for="unitSel">📑 Unit</label>
    <select id="unitSel" disabled>
      <option value="">— Najpierw wybierz podręcznik —</option>
    </select>

    <button class="btn-start" id="startBtn" onclick="startGame()" disabled>🦋 ŁAP MOTYLE!</button>

    <div class="info">
      💡 Pojawia się <strong>polskie słowo</strong> (i jest czytane na głos). Łap motyle z prawidłowym angielskim tłumaczeniem siatką (myszka / palec). 30 sekund — kto da radę?
    </div>
  </div>
  <div class="footer">© 2026 Sowie Fiszki</div>
</div>
<script>
'use strict';
(function(){
  if (typeof BOOKS === 'undefined') return;
  const bs = document.getElementById('bookSel');
  Object.values(BOOKS)
    .filter(b => !b.adminOnly)
    .sort((a,b) => (a.name||'').localeCompare(b.name||'', 'pl'))
    .forEach(b => {
      const o = document.createElement('option');
      o.value = b.id;
      o.textContent = (b.icon||'📖') + ' ' + b.name;
      bs.appendChild(o);
    });
})();
function onBookChange(){
  const bId = document.getElementById('bookSel').value;
  const us = document.getElementById('unitSel');
  const lb = document.getElementById('startBtn');
  us.innerHTML = '';
  if (!bId || !BOOKS[bId]) {
    us.innerHTML = '<option value="">— Najpierw wybierz podręcznik —</option>';
    us.disabled = true; lb.disabled = true; return;
  }
  const all = document.createElement('option');
  all.value = 'all'; all.textContent = '🌍 Wszystkie słowa z podręcznika';
  us.appendChild(all);
  Object.entries(BOOKS[bId].units || {}).forEach(([key, u]) => {
    const o = document.createElement('option');
    o.value = key; o.textContent = (u.icon||'📖') + ' ' + (u.name||key);
    us.appendChild(o);
  });
  us.disabled = false; us.value = 'all'; lb.disabled = false;
}
function startGame(){
  const bId = document.getElementById('bookSel').value;
  const uKey = document.getElementById('unitSel').value;
  if (!bId || !uKey) { alert('Wybierz podręcznik i unit.'); return; }
  window.location.href = 'app.html?game=butterfly&book=' + encodeURIComponent(bId) + '&unit=' + encodeURIComponent(uKey);
}
</script>
</body>
</html>
