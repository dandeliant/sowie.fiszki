<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speaking Game — Present Simple 🗣️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lexend:wght@400;500;600;700;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-1: #fef8ec;
  --bg-2: #f6edd8;
  --ink: #1c1535;
  --ink-soft: #4e4466;
  --violet: #6b3fa0;
  --violet-deep: #452677;
  --violet-light: #b294e0;
  --cream: #fff6e2;
  --green: #3ab77a;
  --green-deep: #1f8455;
  --rose: #e8456b;
  --rose-deep: #b8214c;
  --blue: #4278d1;
  --blue-deep: #2b54a0;
  --amber: #f4a93a;
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
  --shadow-lg: 0 18px 40px -12px rgba(69, 38, 119, 0.35), 0 4px 10px -3px rgba(28, 21, 53, 0.12);
  --shadow-md: 0 8px 20px -6px rgba(69, 38, 119, 0.25);
  --shadow-inset: inset 0 -6px 0 rgba(0,0,0,0.15);
}

*, *::before, *::after { box-sizing: border-box; }

html, body { margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: 'Lexend', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% 10%, #ffe8c2 0%, transparent 40%),
    radial-gradient(circle at 85% 85%, #e3d4ff 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, #d7f3e0 0%, transparent 55%),
    var(--bg-1);
  background-attachment: fixed;
  overflow-x: hidden;
  padding: 20px 16px 40px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(28, 21, 53, 0.08) 1px, transparent 0);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
}

/* ==================== HEADER ==================== */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Nunito', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  color: #2d7a3a;              /* kolor tekstu linku — zmień pod styl strony */
  text-decoration: none;
  background: white;
  padding: 7px 14px;
  border-radius: 20px;
  border: 2px solid #4caf50;   /* kolor obwódki */
  margin-bottom: 14px;
  transition: background .15s;
}
.back-link:hover {
  background: #c8e6c9;          /* jaśniejszy kolor przy najechaniu */
}
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 56px;
  height: 56px;
  background: var(--violet);
  border-radius: 16px;
  display: grid;
  place-items: center;
  font-size: 28px;
  box-shadow: var(--shadow-md), var(--shadow-inset);
  transform: rotate(-4deg);
  transition: transform 0.3s;
}
.logo:hover { transform: rotate(4deg) scale(1.05); }

.brand h1 {
  margin: 0;
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 4vw, 32px);
  letter-spacing: -0.02em;
  color: var(--violet-deep);
  line-height: 1;
}
.brand .sub {
  margin-top: 4px;
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 500;
}

.stats {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.stat {
  background: var(--cream);
  border: 2px solid var(--ink);
  border-radius: 14px;
  padding: 8px 14px;
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 3px 3px 0 var(--ink);
}
.stat .icon { font-size: 18px; }
.stat.yes { background: #d9f5e4; }
.stat.no { background: #ffdee8; }
.stat.total { background: #e0ebff; }

/* ==================== PROGRESS ==================== */
.progress-wrap {
  background: var(--cream);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 3px;
  margin-bottom: 22px;
  box-shadow: 3px 3px 0 var(--ink);
  overflow: hidden;
}
.progress-bar {
  height: 14px;
  background: linear-gradient(90deg, var(--green) 0%, var(--amber) 50%, var(--rose) 100%);
  border-radius: 999px;
  width: 0%;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.progress-bar::after {
  content: '';
  position: absolute;
  top: 2px; left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 999px;
}

/* ==================== GAME CARD ==================== */
.game {
  background: var(--cream);
  border: 3px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: clamp(20px, 3vw, 40px);
  box-shadow: 6px 6px 0 var(--ink);
  position: relative;
  animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes cardEnter {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.badge {
  position: absolute;
  top: -18px;
  left: 30px;
  background: var(--amber);
  border: 3px solid var(--ink);
  border-radius: 12px;
  padding: 6px 14px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  box-shadow: 3px 3px 0 var(--ink);
  transform: rotate(-2deg);
}

/* ==================== QUESTION ==================== */
.question-area {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

@media (min-width: 900px) {
  .question-area { grid-template-columns: 1.1fr 1fr; }
}

.question-box {
  background: #edfbe5;
  border: 3px solid var(--green-deep);
  border-radius: var(--radius-md);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
}

.q-label {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  color: var(--green-deep);
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.q-text {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(22px, 3.2vw, 32px);
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0;
}

/* emphasize uppercase DO/DOES/VERBS */
.q-text .hl-op { color: var(--rose); font-weight: 700; }
.q-text .hl-verb { color: var(--violet); font-weight: 700; }

.speak-btn {
  background: var(--green-deep);
  color: white;
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 10px 18px;
  font-family: 'Lexend', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 0.1s, box-shadow 0.1s;
  align-self: flex-start;
}
.speak-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
.speak-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

/* ==================== PROMPT ==================== */
.prompt-box {
  background: linear-gradient(135deg, #fff4c7 0%, #ffe9a3 100%);
  border: 3px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 140px;
  position: relative;
  overflow: hidden;
}

.prompt-box::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(244, 169, 58, 0.3), transparent 70%);
  border-radius: 50%;
}

.prompt-label {
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.prompt-text {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(36px, 6vw, 56px);
  color: var(--violet-deep);
  letter-spacing: -0.02em;
  line-height: 1;
  position: relative;
  z-index: 1;
}

/* ==================== OPTIONS ==================== */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.option {
  background: white;
  border: 3px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: default;
  box-shadow: 4px 4px 0 var(--ink);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s;
}

.option.yes { border-color: var(--green-deep); background: linear-gradient(160deg, #ffffff 0%, #eaffe6 100%); }
.option.no { border-color: var(--rose-deep); background: linear-gradient(160deg, #ffffff 0%, #ffe6ec 100%); }

.option:hover { transform: translateY(-3px); }

.option-emoji {
  font-size: clamp(54px, 9vw, 80px);
  line-height: 1;
  filter: drop-shadow(2px 3px 0 rgba(28, 21, 53, 0.2));
  animation: floaty 3s ease-in-out infinite;
}

@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.option-label {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(18px, 2.4vw, 22px);
  text-align: center;
  color: var(--ink);
}

.option-tag {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 20px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  border: 2px solid var(--ink);
  background: white;
  box-shadow: 2px 2px 0 var(--ink);
  opacity: 0.4;
  transition: opacity 0.2s;
}
.option.active .option-tag { opacity: 1; }
.option.yes .option-tag { background: var(--green); color: white; }
.option.no .option-tag { background: var(--rose); color: white; }

/* ==================== YES/NO BUTTONS ==================== */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.action-btn {
  background: white;
  border: 3px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(18px, 2.5vw, 22px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 5px 5px 0 var(--ink);
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative;
  overflow: hidden;
}
.action-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
.action-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--ink); }

.action-btn.yes { background: var(--green); color: white; }
.action-btn.no { background: var(--rose); color: white; }

.action-btn .emo { font-size: 28px; }

/* ==================== ANSWER REVEAL ==================== */
.answer-box {
  margin-top: 4px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, var(--violet-deep) 0%, var(--violet) 100%);
  color: white;
  border: 3px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 24px;
  box-shadow: 5px 5px 0 var(--ink);
  display: none;
  position: relative;
  overflow: hidden;
  animation: answerPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes answerPop {
  from { transform: scale(0.9) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.answer-box.show { display: block; }

.answer-box::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 60%);
  border-radius: 50%;
}

.answer-label {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  color: #ffd86e;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.answer-text {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(20px, 3vw, 28px);
  line-height: 1.3;
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.answer-actions {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.answer-actions .speak-btn {
  background: white;
  color: var(--violet-deep);
  border-color: var(--ink);
}

/* ==================== CONTROLS ==================== */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  padding-top: 18px;
  border-top: 2px dashed rgba(28, 21, 53, 0.2);
}

.ctrl-group { display: flex; gap: 10px; flex-wrap: wrap; }

.ctrl {
  background: white;
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 10px 16px;
  font-family: 'Lexend', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 0.1s, box-shadow 0.1s;
  color: var(--ink);
}
.ctrl:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
.ctrl:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
.ctrl.primary { background: var(--violet); color: white; }
.ctrl.active { background: var(--amber); }

.ctrl:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: 2px 2px 0 var(--ink);
}

/* ==================== FOOTER ==================== */
footer {
  margin-top: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
}
footer .heart { color: var(--rose); }

/* ==================== CONFETTI LAYER ==================== */
.confetti {
  position: fixed;
  pointer-events: none;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  z-index: 10;
}

.confetti-piece {
  position: absolute;
  width: 12px; height: 12px;
  top: -20px;
  animation: fall 1.8s ease-in forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* === RESPONSIVE ADJUSTMENTS === */
@media (max-width: 560px) {
  .options { gap: 10px; }
  .option { padding: 14px 10px; }
  .actions { gap: 10px; }
  .action-btn { padding: 14px 12px; }
  .badge { left: 16px; font-size: 12px; }
  .ctrl { padding: 8px 12px; font-size: 13px; }
}

/* === SETTINGS PANEL === */
.settings {
  display: none;
  background: #fff6e2;
  border: 2px dashed var(--violet);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 20px;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.settings.open { display: flex; }
.settings label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.settings select {
  font-family: 'Lexend', sans-serif;
  padding: 6px 10px;
  border: 2px solid var(--ink);
  border-radius: 8px;
  background: white;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<div class="app">
  <header>
    <div class="brand">
      <div class="logo">🦉</div>
      <div>
        <h1>Speaking Game</h1>
        <div class="sub">Present Simple · naucz się mówić pełnymi zdaniami</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat total"><span class="icon">🎯</span><span id="stat-current">1</span> / <span id="stat-total">0</span></div>
      <div class="stat yes"><span class="icon">✅</span><span id="stat-yes">0</span></div>
      <div class="stat no"><span class="icon">❌</span><span id="stat-no">0</span></div>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="settings" id="settings">
    <label>
      🔊 Głos:
      <select id="voiceSelect"></select>
    </label>
    <label>
      ⚡ Prędkość:
      <select id="rateSelect">
        <option value="0.7">🐢 wolno</option>
        <option value="0.85">🚶 normalnie</option>
        <option value="1.0" selected>🏃 szybko</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="autoPlay" /> 🎵 Auto-odtwarzaj pytanie
    </label>
  </div>

  <section class="game">
    <div class="badge">Zadanie</div>

    <div class="question-area">
      <div class="question-box">
        <div class="q-label">🗣️ Question</div>
        <div class="q-text" id="questionText"></div>
        <button class="speak-btn" id="speakQuestion">🔊 Posłuchaj pytania</button>
      </div>

      <div class="prompt-box">
        <div class="prompt-label">Zacznij odpowiedź:</div>
        <div class="prompt-text" id="promptText"></div>
      </div>
    </div>

    <div class="options" id="optionsBox">
      <!-- options injected -->
    </div>

    <div class="actions">
      <button class="action-btn yes" id="btnYes">
        <span class="emo">✅</span> Tak! (Yes)
      </button>
      <button class="action-btn no" id="btnNo">
        <span class="emo">❌</span> Nie! (No)
      </button>
    </div>

    <div class="answer-box" id="answerBox">
      <div class="answer-label">✨ Your sentence:</div>
      <div class="answer-text" id="answerText"></div>
      <div class="answer-actions">
        <button class="speak-btn" id="speakAnswer">🔊 Posłuchaj</button>
        <button class="speak-btn" id="speakSlow">🐢 Wolniej</button>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl" id="btnPrev">← Poprzednie</button>
        <button class="ctrl primary" id="btnNext">Następne →</button>
      </div>
      <div class="ctrl-group">
        <button class="ctrl" id="btnShuffle">🎲 Tasuj</button>
        <button class="ctrl" id="btnRestart">🔄 Od nowa</button>
        <button class="ctrl" id="btnSettings">⚙️ Ustawienia</button>
      </div>
    </div>
  </section>

  <footer>
    Stworzone <span class="heart">♥</span> dla uczniów · Dane: Speaking Game — Present Simple
  </footer>
</div>

<div class="confetti" id="confetti"></div>

<script>
/* ========= TTS setup (preferred pattern) ========= */
let VOICES = [];
let currentRate = 1.0;

function getV() {
  // prefer Google UK English Female, then any British English, then any English
  const prefs = [
    v => /google uk english female/i.test(v.name),
    v => /google uk english/i.test(v.name),
    v => /en-GB/i.test(v.lang) && /female/i.test(v.name),
    v => /en-GB/i.test(v.lang),
    v => /en/i.test(v.lang),
  ];
  for (const p of prefs) {
    const found = VOICES.find(p);
    if (found) return found;
  }
  return VOICES[0];
}

function spk(text, rate) {
  if (!text) return;
  try { speechSynthesis.cancel(); } catch(e){}
  const u = new SpeechSynthesisUtterance(text);
  const v = getV();
  if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = 'en-GB'; }
  u.rate = rate ?? currentRate;
  u.pitch = 1.0;    // fixed pitch per preference
  u.volume = 1.0;
  speechSynthesis.speak(u);
}

function populateVoices() {
  VOICES = speechSynthesis.getVoices() || [];
  const sel = document.getElementById('voiceSelect');
  const englishVoices = VOICES.filter(v => /^en/i.test(v.lang));
  sel.innerHTML = '';
  const defaultV = getV();
  englishVoices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if (defaultV && v.name === defaultV.name) opt.selected = true;
    sel.appendChild(opt);
  });
}
if (typeof speechSynthesis !== 'undefined') {
  populateVoices();
  speechSynthesis.onvoiceschanged = populateVoices;
}

document.getElementById('voiceSelect').addEventListener('change', (e) => {
  const chosen = VOICES.find(v => v.name === e.target.value);
  if (chosen) {
    // override getV by placing chosen first
    VOICES = [chosen, ...VOICES.filter(v => v.name !== chosen.name)];
  }
});
document.getElementById('rateSelect').addEventListener('change', (e) => {
  currentRate = parseFloat(e.target.value);
});

/* ========= DATA ========= */
/*
Every question: highlight operator (DO/DOES) + verb in UPPERCASE originally.
Fields:
  q          – the question text (original uppercase markers preserved)
  prompt     – "I..." / "He..." / "She..." / "My cat..." etc.
  subject    – subject as used in answer ("I","He","She","It","My cat" etc.)
  aux        – "do"/"does"

/* ========= STATE ========= */
let state = {
  order: QUESTIONS.map((_, i) => i),
  idx: 0,
  yes: 0,
  no: 0,
  answered: new Set(),  // indexes already counted
};

/* ========= HELPERS ========= */
function highlightQuestion(str) {
  // highlight DO/DOES (operator) and UPPERCASE verbs
  return str.replace(/\b(DO|DOES)\b/g, '<span class="hl-op">$1</span>')
            .replace(/\b([A-Z]{3,})\b/g, (m) => {
              if (m === 'DO' || m === 'DOES') return m; // already handled
              return `<span class="hl-verb">${m.toLowerCase()}</span>`;
            });
}

function getQ() { return QUESTIONS[state.order[state.idx]]; }

function render() {
  const q = getQ();
  document.getElementById('questionText').innerHTML = highlightQuestion(q.q);
  document.getElementById('promptText').textContent = q.prompt;

  const box = document.getElementById('optionsBox');
  box.innerHTML = `
    <div class="option yes">
      <div class="option-tag">✅</div>
      <div class="option-emoji">${q.optA.emoji}</div>
      <div class="option-label">${q.optA.label}</div>
    </div>
    <div class="option no">
      <div class="option-tag">❌</div>
      <div class="option-emoji">${q.optB.emoji}</div>
      <div class="option-label">${q.optB.label}</div>
    </div>
  `;

  // hide answer
  document.getElementById('answerBox').classList.remove('show');

  // stats
  document.getElementById('stat-current').textContent = state.idx + 1;
  document.getElementById('stat-total').textContent = QUESTIONS.length;
  document.getElementById('stat-yes').textContent = state.yes;
  document.getElementById('stat-no').textContent = state.no;
  const pct = ((state.idx + 1) / QUESTIONS.length) * 100;
  document.getElementById('progress').style.width = pct + '%';

  // prev/next
  document.getElementById('btnPrev').disabled = state.idx === 0;
  document.getElementById('btnNext').disabled = state.idx >= QUESTIONS.length - 1;

  // auto play?
  if (document.getElementById('autoPlay').checked) {
    setTimeout(() => spk(q.q), 250);
  }
}

function reveal(type) {
  const q = getQ();
  const text = type === 'yes' ? q.ansYes : q.ansNo;
  const box = document.getElementById('answerBox');
  const ans = document.getElementById('answerText');

  ans.textContent = text;
  box.style.background = type === 'yes'
    ? 'linear-gradient(135deg, #1f8455 0%, #3ab77a 100%)'
    : 'linear-gradient(135deg, #b8214c 0%, #e8456b 100%)';
  box.classList.add('show');
  document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
  document.querySelector('.option.' + type).classList.add('active');

  // count once per question
  const key = state.order[state.idx] + ':' + type;
  if (!state.answered.has(key)) {
    state.answered.add(key);
    if (type === 'yes') state.yes++;
    else state.no++;
    document.getElementById('stat-yes').textContent = state.yes;
    document.getElementById('stat-no').textContent = state.no;
    if (type === 'yes') burstConfetti();
  }

  spk(text);
}

function next() {
  if (state.idx < QUESTIONS.length - 1) {
    state.idx++;
    render();
  } else {
    // end of deck
    document.getElementById('questionText').innerHTML = '🎉 <span style="color:var(--violet-deep)">The end!</span> Świetna robota!';
    document.getElementById('promptText').textContent = '🏆';
    document.getElementById('optionsBox').innerHTML = '';
    document.getElementById('answerBox').classList.remove('show');
    burstConfetti(60);
  }
}

function prev() {
  if (state.idx > 0) { state.idx--; render(); }
}

function shuffle() {
  for (let i = state.order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
  }
  state.idx = 0;
  render();
}

function restart() {
  state.order = QUESTIONS.map((_, i) => i);
  state.idx = 0; state.yes = 0; state.no = 0;
  state.answered.clear();
  render();
}

/* ========= CONFETTI ========= */
function burstConfetti(count = 24) {
  const layer = document.getElementById('confetti');
  const colors = ['#3ab77a','#e8456b','#f4a93a','#4278d1','#6b3fa0','#fff'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
    p.style.animationDelay = Math.random() * 0.3 + 's';
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    layer.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

/* ========= EVENTS ========= */
document.getElementById('btnYes').addEventListener('click', () => reveal('yes'));
document.getElementById('btnNo').addEventListener('click', () => reveal('no'));
document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnPrev').addEventListener('click', prev);
document.getElementById('btnShuffle').addEventListener('click', shuffle);
document.getElementById('btnRestart').addEventListener('click', restart);
document.getElementById('btnSettings').addEventListener('click', () => {
  const el = document.getElementById('settings');
  el.classList.toggle('open');
});
document.getElementById('speakQuestion').addEventListener('click', () => spk(getQ().q));
document.getElementById('speakAnswer').addEventListener('click', () => {
  const t = document.getElementById('answerText').textContent;
  if (t) spk(t);
});
document.getElementById('speakSlow').addEventListener('click', () => {
  const t = document.getElementById('answerText').textContent;
  if (t) spk(t, 0.6);
});

// option cards clickable as shortcuts
document.getElementById('optionsBox').addEventListener('click', (e) => {
  const card = e.target.closest('.option');
  if (!card) return;
  reveal(card.classList.contains('yes') ? 'yes' : 'no');
});

// keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key.toLowerCase() === 'y' || e.key === '1') reveal('yes');
  else if (e.key.toLowerCase() === 'n' || e.key === '2') reveal('no');
  else if (e.key === ' ') { e.preventDefault(); spk(getQ().q); }
  else if (e.key.toLowerCase() === 's') shuffle();
});

/* ========= INIT ========= */
shuffle(); // start randomised
</script>
